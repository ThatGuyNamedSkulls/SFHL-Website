# Game profile: Valorant.
#
# Demonstrates that the bot is genuinely game-agnostic — different maps, sides,
# stat columns, win condition and rank ladder, with NO code changes. To run the
# bot as Valorant instead of CS, set ACTIVE_GAME_PROFILE in config/settings.py
# to this file.

[meta]
name = "Valorant"
team_size = 5
queue_size = 10

[match]
win_label = "W"
loss_label = "L"
win_condition = "First team to 13 rounds wins"

[scoreboard]
# Valorant has no "MVP" column; it uses ACS (mapped to `score`) and keeps HS%.
stats = ["kills", "deaths", "assists", "score", "hs_percent"]

[maps]
pool = ["Ascent", "Bind", "Haven", "Split", "Icebox", "Breeze", "Lotus", "Sunset"]
sides = ["Attack", "Defense"]

[elo]
base = 20
win_min = 5
win_max = 30
loss_min = 5
loss_max = 30
overperform_ratio = 1.7
underperform_ratio = 0.5
unranked_effective_elo = 1000

[unranked]
name = "Unranked"
elo_min = 0
elo_max = 0

